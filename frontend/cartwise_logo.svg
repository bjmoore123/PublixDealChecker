        stroke-dasharray="28 24"
        stroke-linejoin="round"/>

  <!-- Shopping cart -->
  <g fill="#FFFFFF">
    <rect x="300" y="500" width="380" height="70" rx="35"/>
    <circle cx="420" cy="610" r="45"/>
    <circle cx="650" cy="610" r="45"/>
    <path d="M300 420 L650 420 
             Q720 420 720 470 
             L720 470 
             Q720 520 650 520 
             L360 520 
             Q300 520 300 470 Z"/>
    <rect x="260" y="390" width="120" height="40" rx="20"/>
  </g>

  <!-- Checkmark -->
  <path d="M360 460 L500 580 L760 320"
        fill="none"
        stroke="#FF7A00"
        stroke-width="90"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
