<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Shield background -->
  <path d="M512 80 
           L880 240 
           L820 700 
           Q512 940 204 700 
           L144 240 Z"
        fill="#114B3A"/>
        
  <!-- Dashed inner border -->
  <path d="M512 130 
